services:
  db:
    image: postgres:16-alpine
    container_name: crud-academia-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crud-academia-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      API_PORT: ${API_PORT}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      DB_URI: jdbc:postgresql://db:5432/${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DRIVER: ${DB_DRIVER}
    ports:
      - "${API_PORT}:${API_PORT}"

volumes:
  postgres_data:
